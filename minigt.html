<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mini GT</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #ffffff; color: #1a1a1a; font-family: 'Inter', 'Segoe UI', sans-serif; font-size: 13px; }

  #loading-state, #empty-state, #error-state {
    text-align: center; padding: 60px 20px; color: #9ca3af;
  }
  #loading-state .icon { font-size: 40px; margin-bottom: 12px; animation: spin 1.2s linear infinite; display: inline-block; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  #empty-state .icon, #error-state .icon { font-size: 40px; margin-bottom: 12px; }
  #empty-state h2, #error-state h2 { font-size: 16px; font-weight: 600; color: #374151; margin-bottom: 6px; }

  #grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 16px;
  }
  @media (max-width: 600px) {
    #grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      padding: 10px;
    }
  }

  .card {
    background: #ffffff; border: 1px solid #e5e7eb;
    border-radius: 10px; overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    transition: box-shadow 0.15s, transform 0.15s;
  }
  .card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.12); transform: translateY(-3px); }

  .card-img-wrap {
    width: 100%; aspect-ratio: 1; overflow: hidden;
    background: #f3f4f6; position: relative; cursor: pointer;
  }
  .card-img {
    width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0s;
  }
  .card-img-wrap:hover .card-img { transition: transform 1.5s ease; transform: scale(1.18); }
  .card-img-fallback {
    width: 100%; height: 100%; display: none;
    align-items: center; justify-content: center; font-size: 36px; background: #f3f4f6;
  }

  .card-body {
    padding: 8px 10px 10px; display: flex; flex-direction: column; flex: 1; gap: 3px; text-align: center;
  }
  .card-code-name { font-size: 11px; font-weight: 700; color: #111827; line-height: 1.3; }
  .card-code-name span.code { color: #6b7280; font-weight: 600; }
  .card-brand { font-size: 10px; color: #9ca3af; }
  .card-price { font-size: 14px; font-weight: 700; color: #111827; margin-top: 4px; }

  .add-btn {
    margin-top: 8px; background: #111827; color: #ffffff; border: none;
    border-radius: 6px; padding: 8px 6px; font-size: 11px; font-weight: 600;
    cursor: pointer; width: 100%; transition: background 0.15s; letter-spacing: 0.3px;
  }
  .add-btn:hover { background: #374151; }
  .add-btn:disabled { background: #d1fae5; color: #065f46; cursor: not-allowed; font-weight: 700; }

  #toast {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #111827; color: #fff; padding: 10px 18px; border-radius: 8px;
    font-size: 13px; font-weight: 500; transition: transform 0.3s ease; z-index: 999;
    white-space: nowrap; max-width: 90vw; box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  #pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 16px;
    flex-wrap: wrap;
  }
  .page-btn {
    background: #ffffff;
    border: 1px solid #e5e7eb;
    color: #111827;
    border-radius: 6px;
    padding: 7px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .page-btn:hover:not(:disabled) { background: #f3f4f6; border-color: #111827; }
  .page-btn:disabled { color: #d1d5db; border-color: #f3f4f6; cursor: not-allowed; }
  .page-info {
    font-size: 12px;
    font-weight: 600;
    color: #6b7280;
    padding: 7px 10px;
    white-space: nowrap;
  }
  .sold-btn {
    background: #dc2626 !important;
    color: #ffffff !important;
    cursor: not-allowed !important;
    opacity: 0.85;
  }
  .sold-btn:hover { background: #dc2626 !important; opacity: 0.85; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="loading-state"><div class="icon">🏎️</div><p>Loading catalogue…</p></div>
<div id="error-state" class="hidden"><div class="icon">⚠️</div><h2>Couldn't load products</h2><p>Please refresh.</p></div>
<div id="empty-state" class="hidden"><div class="icon">🚧</div><h2>Coming Soon</h2><p>No products available yet.</p></div>
<div id="grid" class="hidden"></div>
<div id="pagination" class="hidden"></div>
<div id="toast"></div>

<script>
  const SERIES_FILTER = "Mini GT";
  const PRODUCTS_URL  = "products.json";
  
  const STORAGE_KEY = "mylist_v1";
  const SESSION_KEY = "mylist_session_v1";

  function initSession() {
    if (!sessionStorage.getItem(SESSION_KEY)) {
      localStorage.removeItem(STORAGE_KEY);
      sessionStorage.setItem(SESSION_KEY, "active");
    }
  }

  function loadList() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }
    catch { return {}; }
  }

  function saveList(list) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); } catch {}
  }

  let list = {};

  async function init() {
    initSession();
    list = loadList();
    try {
      const res = await fetch(PRODUCTS_URL, { cache: "no-store" });
      if (!res.ok) throw new Error();
      const all = await res.json();
      const seen = {};
      const products = [];
      all.forEach(p => {
        if (p.series === SERIES_FILTER && !seen[p.code]) {
          seen[p.code] = true; products.push(p);
        }
      });
      document.getElementById("loading-state").classList.add("hidden");
      if (products.length === 0) { document.getElementById("empty-state").classList.remove("hidden"); return; }
      const grid = document.getElementById("grid");
      grid.classList.remove("hidden");
      allProducts = products;
      renderPage(1);
      return;
      grid.innerHTML = products.map(p => {
        const inList = !!list[p.code];
        const isSold = p.status === "SOLD";
      return `<div class="card">
          <div class="card-img-wrap">
            <img class="card-img" src="${p.image}" alt="" onclick="openLightbox(this.src)" style="cursor:zoom-in;"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
            <div class="card-img-fallback">🚗</div>
          </div>
          <div class="card-body">
            <div class="card-code-name"><span class="code">${p.code}</span> : ${esc(p.name)}</div>
            <div class="card-brand">${esc(p.brand)}</div>
            <div class="card-price">₹${p.price}</div>
            <button class="add-btn ${isSold ? 'sold-btn' : ''}" id="btn-${p.code}"
              data-code="${p.code}"
              data-name="${esc(p.name)}"
              onclick="addToList(this)"
              ${p.status === "SOLD" || inList ? "disabled" : ""}>
              ${p.status === "SOLD" ? "SOLD OUT" : inList ? "✅ Added to My Garage" : "+ Add to My Garage"}
            </button>
          </div>
        </div>`;
      }).join("");
    } catch(e) {
      document.getElementById("loading-state").classList.add("hidden");
      document.getElementById("error-state").classList.remove("hidden");
    }
  }

  function addToList(btn) {
    const code = btn.dataset.code;
    const name = btn.dataset.name;
    list = loadList();
    if (list[code]) { showToast("Already in your garage!"); return; }
    list[code] = true;
    saveList(list);
    btn.disabled = true;
    btn.textContent = "✅ Added to My Garage";
    showToast("✅ " + name + " added!");
  }

  function esc(str) {
    const d = document.createElement("div"); d.textContent = str; return d.innerHTML;
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
  }

  init();
</script>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);z-index:2000;align-items:center;justify-content:center;cursor:zoom-out;">
  <button onclick="closeLightbox()" style="position:fixed;top:16px;right:16px;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:24px;width:40px;height:40px;border-radius:50%;cursor:pointer;z-index:2001;display:flex;align-items:center;justify-content:center;">✕</button>
  <img id="lightbox-img" src="" style="max-width:92vw;max-height:92vh;object-fit:contain;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,0.5);" onclick="event.stopPropagation()"/>
</div>
<script>
  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').style.display = 'flex';
  }
  function closeLightbox() {
    document.getElementById('lightbox').style.display = 'none';
    document.getElementById('lightbox-img').src = '';
  }
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeLightbox();
  });

  // ── Pagination ──
  let allProducts = [];
  let currentPage = 1;

  function getRowsPerPage() {
    return 4;
  }

  function getColsPerRow() {
    return window.innerWidth <= 600 ? 2 : 4;
  }

  function getItemsPerPage() {
    return getRowsPerPage() * getColsPerRow();
  }

  function getTotalPages() {
    return Math.ceil(allProducts.length / getItemsPerPage());
  }

  function renderPage(page) {
    currentPage = page;
    const itemsPerPage = getItemsPerPage();
    const start = (page - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const pageProducts = allProducts.slice(start, end);
    const list = loadList();

    const grid = document.getElementById('grid');
    grid.innerHTML = pageProducts.map(p => {
      const inList = !!list[p.code];
      const isSold = p.status === "SOLD";
      return `<div class="card">
        <div class="card-img-wrap">
          <img class="card-img" src="${p.image}" alt="" onclick="openLightbox(this.src)" style="cursor:zoom-in;"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
          <div class="card-img-fallback">🚗</div>
        </div>
        <div class="card-body">
          <div class="card-code-name"><span class="code">${p.code}</span> : ${esc(p.name)}</div>
          <div class="card-brand">${esc(p.brand)}</div>
          <div class="card-price">₹${p.price}</div>
          <button class="add-btn ${isSold ? 'sold-btn' : ''}" id="btn-${p.code}"
            data-code="${p.code}"
            data-name="${esc(p.name)}"
            onclick="addToList(this)"
            ${p.status === "SOLD" || inList ? "disabled" : ""}>
            ${p.status === "SOLD" ? "SOLD OUT" : inList ? "✅ Added to My Garage" : "+ Add to My Garage"}
          </button>
        </div>
      </div>`;
    }).join('');

    renderPagination();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function renderPagination() {
    const total = getTotalPages();
    const pag = document.getElementById('pagination');

    if (total <= 1) { pag.classList.add('hidden'); return; }
    pag.classList.remove('hidden');

    pag.innerHTML = `
      <button class="page-btn" onclick="renderPage(1)" ${currentPage === 1 ? 'disabled' : ''}>&lt;&lt; First</button>
      <button class="page-btn" onclick="renderPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>&lt; Prev</button>
      <span class="page-info">${currentPage} of ${total}</span>
      <button class="page-btn" onclick="renderPage(${currentPage + 1})" ${currentPage === total ? 'disabled' : ''}>Next &gt;</button>
      <button class="page-btn" onclick="renderPage(${total})" ${currentPage === total ? 'disabled' : ''}>Last &gt;&gt;</button>
    `;
  }

  window.addEventListener('resize', () => renderPage(currentPage));

</script>
</body>
</html>
